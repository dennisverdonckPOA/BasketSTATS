<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MusketierScout V9 - ULTIMATE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; touch-action: manipulation; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .jersey {
            width: 44px; height: 54px; background: #2563eb; color: white;
            clip-path: polygon(10% 0, 90% 0, 100% 20%, 100% 100%, 0 100%, 0 20%);
            display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1.2rem;
        }
        .active-selection { border: 3px solid #3b82f6 !important; background: rgba(59, 130, 246, 0.2) !important; }
        
        /* Subtiele fouten indicatoren (onderlijning ipv rand) */
        .foul-warning { border-bottom: 5px solid #f59e0b !important; border-radius: 1.5rem 1.5rem 4px 4px; }
        .foul-danger { border-bottom: 5px solid #ef4444 !important; border-radius: 1.5rem 1.5rem 4px 4px; opacity: 0.5; }

        .stat-btn-big { font-weight: 900; text-transform: uppercase; transition: all 0.1s; font-size: 10px; }
        .stat-btn-big:active { transform: scale(0.96); opacity: 0.7; }

        #toast {
            visibility: hidden; min-width: 200px; background-color: #1e293b; color: #fff;
            text-align: center; border-radius: 12px; padding: 12px; position: fixed;
            z-index: 100; left: 50%; bottom: 30px; transform: translateX(-50%); font-weight: bold; border: 1px solid #334155;
        }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 1.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body class="p-2 select-none overflow-x-hidden">

<div id="toast">Actie ongedaan gemaakt ↩</div>

<div id="app" class="max-w-5xl mx-auto">
    
    <div id="setup-screen" class="mt-4 glass p-6 rounded-[2rem] shadow-2xl">
        <h1 style="font-family: 'Orbitron';" class="text-2xl font-black mb-6 text-center text-blue-500 tracking-widest uppercase">Musketiers Setup</h1>
        
        <div class="grid grid-cols-2 gap-4 mb-4">
            <div class="col-span-2 flex bg-slate-900 p-1 rounded-xl border border-slate-700">
                <button id="btn-home" onclick="setSide('Home')" class="flex-1 py-2 rounded-lg font-black bg-blue-600">HOME</button>
                <button id="btn-away" onclick="setSide('Away')" class="flex-1 py-2 rounded-lg font-black text-slate-500">AWAY</button>
            </div>
            <input type="text" id="opp-name" placeholder="Tegenstander" class="bg-slate-900 p-3 rounded-xl border border-slate-700 font-bold">
            <input type="text" id="coach-name" placeholder="Naam Coach" class="bg-slate-900 p-3 rounded-xl border border-slate-700 font-bold">
            <input type="text" id="match-loc" placeholder="Adres / Locatie" class="bg-slate-900 p-3 rounded-xl border border-slate-700 font-bold col-span-2">
            <div class="col-span-2 flex gap-4">
                <input type="date" id="match-date" class="bg-slate-900 p-3 rounded-xl border border-slate-700 font-bold flex-1">
                <input type="time" id="match-time" class="bg-slate-900 p-3 rounded-xl border border-slate-700 font-bold flex-1">
            </div>
        </div>

        <div id="player-inputs" class="grid grid-cols-1 md:grid-cols-2 gap-2 mb-6 max-h-[30vh] overflow-y-auto pr-2"></div>
        <button onclick="goToStarters()" class="w-full bg-blue-600 py-4 rounded-xl font-black text-lg">TEAM BEVESTIGEN</button>
    </div>

    <div id="starters-screen" class="hidden mt-6 glass p-8 rounded-[2rem] text-center">
        <h2 id="starter-title" style="font-family: 'Orbitron';" class="text-2xl font-black mb-2 text-blue-400">SELECTIE</h2>
        <p class="text-slate-400 mb-6">Wie komt er nu op het veld? (5 kiezen)</p>
        <div id="starters-grid" class="grid grid-cols-3 gap-3 mb-8"></div>
        <button onclick="startGame()" id="start-match-btn" class="w-full bg-emerald-600 py-5 rounded-2xl font-black text-xl opacity-50 cursor-not-allowed" disabled>HET VELD OP</button>
    </div>

    <div id="tracker-screen" class="hidden">
        <div class="grid grid-cols-3 gap-2 mb-4">
            <div class="glass p-3 rounded-3xl text-center">
                <span class="text-[10px] font-black text-slate-500 uppercase">Quarter</span>
                <div class="text-3xl font-black" id="q-display">1</div>
                <button onclick="triggerNextQuarter()" class="bg-slate-700 text-[9px] py-1 px-3 rounded-full mt-1 font-black">VOLG. Q</button>
            </div>
            <div class="glass p-4 rounded-3xl text-center border-b-4 border-blue-600">
                <div class="text-3xl font-mono font-black text-blue-400" id="timer-display">10:00</div>
                <button onclick="toggleTimer()" id="timer-btn" class="mt-2 bg-white text-black px-4 py-1 rounded-full text-[10px] font-black uppercase">START</button>
            </div>
            <div class="glass p-3 rounded-3xl text-center">
                <span class="text-[10px] font-black text-slate-500 uppercase">Score</span>
                <div class="flex justify-center items-center gap-2">
                    <span class="text-3xl font-black text-emerald-400" id="team-score">0</span>
                    <span class="text-2xl font-black text-slate-700">-</span>
                    <span class="text-3xl font-black text-red-500" id="opp-score-display">0</span>
                </div>
                <button onclick="addTimeout()" class="text-[9px] bg-amber-600 py-1 px-3 rounded-full mt-1 font-black uppercase">Timeout (<span id="to-count">0</span>)</button>
            </div>
        </div>

        <div class="grid grid-cols-5 gap-2 mb-6" id="court-grid"></div>

        <div id="action-panel" class="glass p-5 rounded-[2.5rem] shadow-inner border-t border-slate-700">
            <div class="flex justify-between items-center mb-4">
                <div class="flex items-center gap-3">
                    <div id="active-jersey" class="jersey bg-blue-600 scale-75">?</div>
                    <h2 id="active-p-label" class="text-xl font-black text-white uppercase truncate max-w-[150px]">Kies speler</h2>
                </div>
                <button onclick="undo()" class="bg-slate-800 p-2 px-4 rounded-xl text-[10px] font-black border border-slate-600">UNDO</button>
            </div>

            <div class="grid grid-cols-3 gap-3">
                <button onclick="record('2pm')" class="stat-btn-big bg-emerald-600 h-16 rounded-xl">2PT RAAK</button>
                <button onclick="record('3pm')" class="stat-btn-big bg-emerald-700 h-16 rounded-xl">3PT RAAK</button>
                <button onclick="record('ftm')" class="stat-btn-big bg-emerald-500 h-16 rounded-xl">FT RAAK</button>
                <button onclick="record('2pa')" class="stat-btn-big bg-slate-800 text-slate-400 h-12 rounded-xl">2PT MIS</button>
                <button onclick="record('3pa')" class="stat-btn-big bg-slate-800 text-slate-400 h-12 rounded-xl">3PT MIS</button>
                <button onclick="record('fta')" class="stat-btn-big bg-slate-800 text-slate-400 h-12 rounded-xl">FT MIS</button>
                <button onclick="record('ast')" class="stat-btn-big bg-blue-600 h-12 rounded-xl">ASSIST</button>
                <button onclick="record('oreb')" class="stat-btn-big bg-orange-600 h-12 rounded-xl">OFF REB</button>
                <button onclick="record('dreb')" class="stat-btn-big bg-orange-700 h-12 rounded-xl">DEF REB</button>
                <button onclick="record('stl')" class="stat-btn-big bg-indigo-600 h-12 rounded-xl">STEAL</button>
                <button onclick="record('blk')" class="stat-btn-big bg-indigo-800 h-12 rounded-xl">BLOCK</button>
                <button onclick="record('to')" class="stat-btn-big bg-red-900 h-12 rounded-xl">TURNOVER</button>
                <button onclick="record('foul')" class="stat-btn-big bg-slate-200 text-black h-16 rounded-xl">FOUT</button>
                <button onclick="record('foul_p1')" class="stat-btn-big bg-slate-400 text-black h-16 rounded-xl">FOUT+1</button>
                <button onclick="record('foul_p2')" class="stat-btn-big bg-slate-600 text-black h-16 rounded-xl">FOUT+2</button>
            </div>
        </div>

        <div class="mt-4 glass p-3 rounded-2xl">
            <span class="text-[10px] font-black text-slate-500 uppercase ml-2">Wisselbank</span>
            <div id="bench-grid" class="flex gap-4 overflow-x-auto mt-2"></div>
        </div>
        <button onclick="preFinish()" class="w-full mt-6 bg-red-600 py-4 rounded-xl font-black uppercase">Beëindig Match</button>
    </div>

    <div id="report-screen" class="hidden bg-white text-slate-900 p-8 rounded-[2rem] my-4 shadow-2xl">
        <div class="flex justify-between items-start border-b-4 border-slate-900 pb-4 mb-6">
            <div id="report-meta"></div>
            <div class="text-right">
                <div class="text-5xl font-black" id="rep-final-score">0-0</div>
                <div class="text-xs font-bold text-slate-400 mt-1 uppercase">Time-outs: <span id="rep-to">0</span></div>
            </div>
        </div>
        <div id="rep-evolution" class="grid grid-cols-4 gap-2 mb-6"></div>
        <div id="rep-table" class="overflow-x-auto mb-8 border rounded-xl"></div>
        <div class="no-print flex gap-4">
            <button onclick="window.print()" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold">PDF / PRINT</button>
            <button onclick="exportCSV()" class="bg-emerald-600 text-white px-8 py-3 rounded-xl font-bold">EXCEL</button>
            <button onclick="location.reload()" class="bg-slate-200 px-8 py-3 rounded-xl font-bold">NIEUW</button>
        </div>
    </div>
</div>

<script>
    let players = [];
    let onCourtIds = [];
    let tempStarters = [];
    let selectedId = null;
    let quarter = 1;
    let timerSec = 600;
    let timerInterval = null;
    let teamScore = 0;
    let oppScoreTotal = 0;
    let totalTimeouts = 0;
    let matchSide = 'Home';
    let history = [];
    let qLog = { 1: {our:0, opp:0}, 2: {our:0, opp:0}, 3: {our:0, opp:0}, 4: {our:0, opp:0} };

    for (let i = 1; i <= 12; i++) {
        document.getElementById('player-inputs').innerHTML += `
            <div class="flex gap-2">
                <input type="number" id="nr-${i}" placeholder="Nr" class="w-16 bg-slate-900 p-3 rounded-xl border border-slate-700 font-black text-blue-400 text-center">
                <input type="text" id="name-${i}" placeholder="Naam speler" class="flex-1 bg-slate-900 p-3 rounded-xl border border-slate-700 font-bold">
            </div>`;
    }

    function setSide(side) {
        matchSide = side;
        document.getElementById('btn-home').className = `flex-1 py-2 rounded-lg font-black ${side === 'Home' ? 'bg-blue-600 text-white' : 'text-slate-500'}`;
        document.getElementById('btn-away').className = `flex-1 py-2 rounded-lg font-black ${side === 'Away' ? 'bg-blue-600 text-white' : 'text-slate-500'}`;
    }

    function goToStarters() {
        players = [];
        for (let i = 1; i <= 12; i++) {
            const name = document.getElementById(`name-${i}`).value;
            if (name) {
                players.push({
                    id: i, nr: document.getElementById(`nr-${i}`).value || '?', name: name, 
                    stats: { '2pm':0,'2pa':0,'3pm':0,'3pa':0,'ftm':0,'fta':0, ast:0, oreb:0, dreb:0, foul:0, stl:0, blk:0, to:0 },
                    sec: 0, pmStart: 0, pm: 0
                });
            }
        }
        if (players.length < 5) return alert("Minimaal 5 spelers nodig.");
        showStarterSelection("Startopstelling");
    }

    function showStarterSelection(title) {
        tempStarters = [];
        document.getElementById('starter-title').innerText = title;
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('tracker-screen').classList.add('hidden');
        document.getElementById('starters-screen').classList.remove('hidden');
        
        const grid = document.getElementById('starters-grid');
        grid.innerHTML = '';
        players.forEach(p => {
            const isOut = p.stats.foul >= 5;
            grid.innerHTML += `
                <div onclick="${isOut ? '' : `toggleStarterChoice(${p.id})`}" id="st-${p.id}" class="glass p-4 rounded-xl flex flex-col items-center border-2 border-transparent transition-all ${isOut ? 'opacity-20 grayscale' : ''}">
                    <div class="jersey">${p.nr}</div>
                    <div class="text-[10px] font-bold mt-1 uppercase truncate w-full text-center">${p.name}</div>
                    ${isOut ? '<span class="text-[8px] font-black text-red-500">OUT (5)</span>' : ''}
                </div>`;
        });
        updateStarterBtn();
    }

    function toggleStarterChoice(id) {
        if (tempStarters.includes(id)) {
            tempStarters = tempStarters.filter(i => i !== id);
            document.getElementById(`st-${id}`).classList.remove('active-selection');
        } else if (tempStarters.length < 5) {
            tempStarters.push(id);
            document.getElementById(`st-${id}`).classList.add('active-selection');
        }
        updateStarterBtn();
    }

    function updateStarterBtn() {
        const btn = document.getElementById('start-match-btn');
        btn.disabled = tempStarters.length !== 5;
        btn.style.opacity = tempStarters.length === 5 ? "1" : "0.5";
    }

    function startGame() {
        onCourtIds = [...tempStarters];
        players.forEach(p => { if(onCourtIds.includes(p.id)) p.pmStart = (teamScore - oppScoreTotal); });
        document.getElementById('starters-screen').classList.add('hidden');
        document.getElementById('tracker-screen').classList.remove('hidden');
        selectedId = null;
        render();
    }

    function render() {
        const court = document.getElementById('court-grid');
        court.innerHTML = '';
        players.filter(p => onCourtIds.includes(p.id)).forEach(p => {
            let status = p.stats.foul >= 5 ? 'foul-danger' : (p.stats.foul >= 3 ? 'foul-warning' : '');
            court.innerHTML += `
                <div onclick="selectPlayer(${p.id}, true)" class="glass p-3 rounded-2xl flex flex-col items-center border-2 transition-all ${selectedId === p.id ? 'active-selection' : 'border-transparent'} ${status}">
                    <div class="jersey">${p.nr}</div>
                    <div class="text-[9px] font-black mt-2 truncate w-full text-center uppercase">${p.name}</div>
                    <div class="text-[10px] font-bold text-slate-500">+/- ${p.pm + ((teamScore - oppScoreTotal) - p.pmStart)}</div>
                </div>`;
        });

        const bench = document.getElementById('bench-grid');
        bench.innerHTML = '';
        players.filter(p => !onCourtIds.includes(p.id)).forEach(p => {
            const isOut = p.stats.foul >= 5;
            bench.innerHTML += `
                <div onclick="${isOut ? '' : `selectPlayer(${p.id}, false)`}" class="glass p-3 rounded-xl flex-shrink-0 w-20 opacity-40 flex flex-col items-center ${isOut ? 'grayscale' : ''}">
                    <div class="jersey bg-slate-700">${p.nr}</div>
                    <div class="text-[8px] font-bold mt-1 truncate w-full text-center uppercase">${p.name}</div>
                </div>`;
        });
    }

    function selectPlayer(id, onC) {
        if (onC) {
            selectedId = id;
            let p = players.find(x => x.id === id);
            document.getElementById('active-p-label').innerText = p.name;
            document.getElementById('active-jersey').innerText = p.nr;
        } else if (selectedId && onCourtIds.includes(selectedId)) {
            let pOut = players.find(x => x.id === selectedId);
            let pIn = players.find(x => x.id === id);
            pOut.pm += ((teamScore - oppScoreTotal) - pOut.pmStart);
            pIn.pmStart = (teamScore - oppScoreTotal);
            onCourtIds = onCourtIds.filter(i => i !== selectedId).concat(id);
            selectedId = id;
            document.getElementById('active-p-label').innerText = pIn.name;
            document.getElementById('active-jersey').innerText = pIn.nr;
        }
        render();
    }

    function record(type) {
        if (!selectedId) return;
        let p = players.find(x => x.id === selectedId);
        let pts = type === '2pm' ? 2 : (type === '3pm' ? 3 : (type === 'ftm' ? 1 : 0));

        if (type.includes('foul')) {
            if (p.stats.foul >= 5) return;
            p.stats.foul++;
            if (p.stats.foul === 5) alert(`${p.name} heeft 5 fouten! Wissel hem uit.`);
        } else if (pts > 0) {
            teamScore += pts; p.stats[type]++; p.stats[type.replace('m','a')]++;
            document.getElementById('team-score').innerText = teamScore;
        } else { p.stats[type]++; }

        history.push({pId: selectedId, type, pts});
        render();
    }

    function undo() {
        if (history.length === 0) return;
        let last = history.pop();
        let p = players.find(x => x.id === last.pId);
        if (last.type.includes('foul')) p.stats.foul--;
        else if (last.pts > 0) {
            teamScore -= last.pts; p.stats[last.type]--; p.stats[last.type.replace('m','a')]--;
            document.getElementById('team-score').innerText = teamScore;
        } else { p.stats[last.type]--; }
        const t = document.getElementById("toast"); t.className = "show";
        setTimeout(()=> { t.className = ""; }, 2000);
        render();
    }

    function toggleTimer() {
        const btn = document.getElementById('timer-btn');
        if (timerInterval) {
            clearInterval(timerInterval); timerInterval = null;
            btn.innerText = "START"; btn.classList.replace('bg-red-500', 'bg-white');
        } else {
            btn.innerText = "PAUZE"; btn.classList.replace('bg-white', 'bg-red-500');
            timerInterval = setInterval(() => {
                if (timerSec > 0) {
                    timerSec--;
                    players.filter(p => onCourtIds.includes(p.id)).forEach(p => p.sec++);
                    let m = Math.floor(timerSec/60), s = timerSec%60;
                    document.getElementById('timer-display').innerText = `${m}:${s<10?'0':''}${s}`;
                } else { toggleTimer(); }
            }, 1000);
        }
    }

    function addTimeout() { totalTimeouts++; document.getElementById('to-count').innerText = totalTimeouts; }

    function triggerNextQuarter() {
        let val = prompt(`Einde Q${quarter}. Totaal score tegenstander?`, oppScoreTotal);
        if (val === null) return;
        let ns = parseInt(val);
        if (ns < oppScoreTotal) return alert("Score kan niet lager zijn dan vorig kwart.");
        
        qLog[quarter] = {our: teamScore, opp: ns};
        oppScoreTotal = ns;
        document.getElementById('opp-score-display').innerText = oppScoreTotal;

        players.filter(p => onCourtIds.includes(p.id)).forEach(p => {
            p.pm += ((teamScore - oppScoreTotal) - p.pmStart);
        });
        
        // RESET VOOR NIEUW KWART
        onCourtIds = [];
        timerSec = 600; // Reset naar 10:00
        document.getElementById('timer-display').innerText = "10:00";
        if (timerInterval) toggleTimer(); // Stop timer

        if (quarter < 4) {
            quarter++;
            document.getElementById('q-display').innerText = quarter;
            showStarterSelection(`Kies opstelling Q${quarter}`);
        } else {
            alert("Vierde kwart voltooid. Klik op Beëindig Match.");
        }
    }

    function preFinish() {
        if (qLog[quarter].our === 0) {
            let val = prompt("Eindscore tegenstander?", oppScoreTotal);
            if (val === null) return;
            qLog[quarter] = {our: teamScore, opp: parseInt(val)};
            oppScoreTotal = parseInt(val);
        }
        finish();
    }

    function finish() {
        players.filter(p => onCourtIds.includes(p.id)).forEach(p => {
            p.pm += ((teamScore - oppScoreTotal) - p.pmStart);
        });
        document.getElementById('tracker-screen').classList.add('hidden');
        document.getElementById('report-screen').classList.remove('hidden');
        
        document.getElementById('report-meta').innerHTML = `
            <h2 class="text-xl font-bold uppercase">${matchSide === 'Home' ? 'Musketiers' : document.getElementById('opp-name').value} vs ${matchSide === 'Home' ? document.getElementById('opp-name').value : 'Musketiers'}</h2>
            <p class="text-xs text-slate-500 font-bold">Coach: ${document.getElementById('coach-name').value}</p>
            <p class="text-[10px] text-slate-400 font-bold uppercase mt-1">${document.getElementById('match-loc').value} | ${document.getElementById('match-date').value} ${document.getElementById('match-time').value}</p>
        `;
        document.getElementById('rep-final-score').innerText = `${teamScore}-${oppScoreTotal}`;
        document.getElementById('rep-to').innerText = totalTimeouts;

        let evH = ''; let lastD = 0;
        for (let i=1; i<=4; i++) {
            let d = qLog[i].our - qLog[i].opp;
            let c = d >= lastD ? 'bg-emerald-50 border-emerald-400 text-emerald-800' : 'bg-red-50 border-red-400 text-red-800';
            evH += `<div class="border-2 p-3 rounded-2xl ${c} text-center"><div class="text-[8px] font-black uppercase">Q${i}</div><div class="text-lg font-black">${qLog[i].our}-${qLog[i].opp}</div></div>`;
            lastD = d;
        }
        document.getElementById('rep-evolution').innerHTML = evH;

        let table = `<table class="w-full text-[10px] text-left border-collapse"><thead class="bg-slate-900 text-white uppercase"><tr><th class="p-2">Speler</th><th class="p-2 text-center">PTS</th><th class="p-2 text-center">FG</th><th class="p-2 text-center">3PT</th><th class="p-2 text-center">FT</th><th class="p-2 text-center">AST</th><th class="p-2 text-center">REB</th><th class="p-2 text-center">STL</th><th class="p-2 text-center">BLK</th><th class="p-2 text-center text-red-400">TO</th><th class="p-2 text-center">F</th><th class="p-2 text-center">MIN</th><th class="p-2 text-center bg-blue-800">+/-</th></tr></thead><tbody>`;
        players.forEach(p => {
            let pts = (p.stats['2pm']*2)+(p.stats['3pm']*3)+p.stats['ftm'];
            table += `<tr class="border-b border-slate-100"><td class="p-2 font-black">${p.nr}. ${p.name}</td><td class="p-2 text-center font-bold text-blue-700">${pts}</td><td class="p-2 text-center">${p.stats['2pm']}/${p.stats['2pa']}</td><td class="p-2 text-center">${p.stats['3pm']}/${p.stats['3pa']}</td><td class="p-2 text-center">${p.stats['ftm']}/${p.stats['fta']}</td><td class="p-2 text-center">${p.stats.ast}</td><td class="p-2 text-center">${p.stats.oreb+p.stats.dreb}</td><td class="p-2 text-center">${p.stats.stl}</td><td class="p-2 text-center">${p.stats.blk}</td><td class="p-2 text-center">${p.stats.to}</td><td class="p-2 text-center font-bold ${p.stats.foul>=5?'text-red-500':''}">${p.stats.foul}</td><td class="p-2 text-center">${Math.floor(p.sec/60)}'</td><td class="p-2 text-center font-black ${p.pm>=0?'text-emerald-600':'text-red-600'}">${p.pm>0?'+':''}${p.pm}</td></tr>`;
        });
        document.getElementById('rep-table').innerHTML = table + `</tbody></table>`;
    }

    function exportCSV() {
        let csv = "Nr,Naam,Punten,2PM,2PA,3PM,3PA,FTM,FTA,Assists,Rebounds,Steals,Blocks,Turnovers,Fouten,Minuten,PlusMinus\n";
        players.forEach(p => {
            let pts = (p.stats['2pm']*2)+(p.stats['3pm']*3)+p.stats['ftm'];
            csv += `${p.nr},${p.name},${pts},${p.stats['2pm']},${p.stats['2pa']},${p.stats['3pm']},${p.stats['3pa']},${p.stats['ftm']},${p.stats['fta']},${p.stats.ast},${p.stats.oreb+p.stats.dreb},${p.stats.stl},${p.stats.blk},${p.stats.to},${p.stats.foul},${Math.floor(p.sec/60)},${p.pm}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = `Musketiers_Scout_Export.csv`; a.click();
    }
</script>
</body>
</html>
